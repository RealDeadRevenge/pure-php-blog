networks:
  default:
    name: ${COMPOSE_APP_NAME}-${COMPOSE_BRANCH}-net-${COMPOSE_APP_VERSION}
    driver: bridge
services:
  nginx:
    image: ${COMPOSE_APP_NAME}-${COMPOSE_BRANCH}-nginx:${COMPOSE_APP_VERSION}
    container_name: ${COMPOSE_APP_NAME}-${COMPOSE_BRANCH}-nginx-${COMPOSE_APP_VERSION}
    restart: always
    build:
      context: ./
      dockerfile: docker/nginx/Dockerfile
    volumes:
      - ./project/:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - ${NGINX_PORT_MAP}
    depends_on:
      - php
  php:
    image: ${COMPOSE_APP_NAME}-${COMPOSE_BRANCH}-php:${COMPOSE_APP_VERSION}
    container_name: ${COMPOSE_APP_NAME}-${COMPOSE_BRANCH}-php-${COMPOSE_APP_VERSION}
    restart: always
    build:
      context: ./
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./project/:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
    depends_on:
      - mysql
  mysql:
    image: ${COMPOSE_APP_NAME}-${COMPOSE_BRANCH}-mysql:${COMPOSE_APP_VERSION}
    container_name: ${COMPOSE_APP_NAME}-${COMPOSE_BRANCH}-mysql-${COMPOSE_APP_VERSION}
    restart: always
    build:
      context: ./
      dockerfile: docker/mysql/Dockerfile
    volumes:
      - ./storage/mysql:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - ${MYSQL_PORT_MAP}
